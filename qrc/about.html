<html>
    <body align="center" bgcolor="f2f4f4">
    <img
        src="https://raw.githubusercontent.com/zynomon/onu/main/onu.svg"
        width="343"
        height="140"
        onerror="this.src='%1'"
    />

<div align="left">
    <h1> %2 <sub>v%3</sub></h1>
    <hr style="color: aliceblue" />
         <b>Maintainer:</b> Zynomon Aelius <zynomon@proton.me><br>
        <b>Qt:</b> %4<br>
        <b>Flags:</b> %5<br>
         <b>Config:</b> %6/onu.conf<br>
           <b>Themes:</b> %7<br>
</div>

<div class="license-view" style="display:none;"></div>

<script type="module">
(async () => {
    const licenseViewDiv = document.querySelector('.license-view');
    let htmlContent = '';
    let anyContentLoaded = false;

    if (!navigator.onLine) {
        return;
    }
    try {
        const lgplResponse = await fetch('https://raw.githubusercontent.com/zynomon/onu/release/Notices/0.5-NOTICE');
        if (lgplResponse.ok) {
            const text = await lgplResponse.text();
            htmlContent += '<h3>Updates about your version</h3><hr>';
            htmlContent += '<code class="license-text-container">' + text + '</code><br>';
            anyContentLoaded = true;
        }
    } catch (err) {
        console.warn("Notice fetch failed:", err);
    }

    try {
        const lgplResponse = await fetch('https://raw.githubusercontent.com/qt/qt/4.8/LICENSE.LGPLv3');
        if (lgplResponse.ok) {
            const text = await lgplResponse.text();
            htmlContent += '<h2>Qt 6 license</h2><hr>';
            htmlContent += '<code class="license-text-container">' + text + '</code><br>';
            anyContentLoaded = true;
        }
    } catch (err) {
        console.warn("LGPL fetch failed:", err);
    }

    try {
        const onuResponse = await fetch('https://raw.githubusercontent.com/zynomon/onu/main/docs/LICENSE');
        if (onuResponse.ok) {
            const text = await onuResponse.text();
            htmlContent += '<h2>Onu license</h2><hr>';
            htmlContent += '<code class="license-text-container">' + text + '</code><br>';
            anyContentLoaded = true;
        }
    } catch (err) {
        console.warn("Onu fetch failed:", err);
    }

    if (anyContentLoaded) {
        licenseViewDiv.innerHTML = htmlContent;
        licenseViewDiv.style.display = 'block';

        const style = document.createElement('style');
        style.textContent = `
            .license-text-container {
                display: block;
                white-space: pre-wrap;
                font-family: monospace;
                background: #f9f9f9;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 4px;
                margin-bottom: 20px;
            }
        `;
        document.head.appendChild(style);
    }
})();
</script>


</body>
</html>
