<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Permission Architect</title>
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --card-bg: #1a1a1a;
            --btn-grey: #444444;
            --btn-shadow: #000000;
            --accent-blue: #005bb5;
            --accent-light: #00a2ff;
            --text-main: #dcdcdc;
            --font-mono: "Nimbus Mono", "Courier New", monospace;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-mono);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--accent-light);
            text-shadow: 0 0 15px var(--accent-blue);
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 10px;
            margin-bottom: 40px;
        }

        #permission-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .perm-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 4px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        .perm-card:hover {
            border-color: var(--accent-blue);
        }

        .perm-title {
            font-weight: bold;
            font-size: 1.1em;
            color: var(--accent-light);
            margin-bottom: 15px;
            text-transform: uppercase;
            border-left: 4px solid var(--accent-blue);
            padding-left: 10px;
        }

        .config-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            background: #111;
            padding: 10px;
            border-radius: 4px;
        }

        .config-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.7em;
            color: #888;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        input, select {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 5px;
            font-family: var(--font-mono);
            font-size: 0.8em;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        .run-btn {
            background: var(--btn-grey);
            color: white;
            border: none;
            padding: 12px;
            font-family: var(--font-mono);
            font-weight: bold;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 0 var(--btn-shadow);
            text-transform: uppercase;
            transition: all 0.1s;
        }

        .run-btn:hover {
            background: #555;
            box-shadow: 0 4px 0 var(--accent-blue);
        }

        .run-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 var(--btn-shadow);
        }

        .status-msg {
            margin-top: 15px;
            font-size: 0.75em;
            min-height: 1.2em;
            color: #666;
            word-break: break-all;
            border-top: 1px solid #333;
            padding-top: 8px;
        }

        #master-log {
            width: 100%;
            max-width: 1200px;
            height: 200px;
            background: #000;
            margin-top: 40px;
            border: 1px solid var(--accent-blue);
            padding: 15px;
            font-size: 0.8em;
            color: #00ff41;
            overflow-y: auto;
            box-shadow: inset 0 0 10px #001122;
        }

        .log-entry { margin-bottom: 4px; border-left: 2px solid #222; padding-left: 8px; }
        .success { color: #00ff41; }
        .error { color: #ff3333; }
        .info { color: var(--accent-light); }
    </style>
</head>
<body>

    <h1>Permission Testing Lab</h1>

    <div id="permission-container"></div>

    <div id="master-log">
        <div class="log-entry info">> System Initialized. Awaiting user input...</div>
    </div>

<script>

    const config = {
        notifications: {
            title: "Notifications",
            fields: [
                { id: "notif_title", label: "Title", type: "text", default: "Test Alert" },
                { id: "notif_body", label: "Body", type: "text", default: "This is a custom notification body content." },
                { id: "notif_icon", label: "Icon URL", type: "text", default: "https://cdn-icons-png.flaticon.com/512/1827/1827347.png" }
            ],
            action: async (vals) => {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    new Notification(vals.notif_title, { body: vals.notif_body, icon: vals.notif_icon });
                    return "Notification Spawned";
                }
                throw new Error("Permission: " + permission);
            }
        },
        popups: {
            title: "Popups",
            fields: [
                { id: "pop_url", label: "URL", type: "text", default: "about:blank" },
                { id: "pop_w", label: "Width", type: "number", default: 400 },
                { id: "pop_h", label: "Height", type: "number", default: 300 }
            ],
            action: async (vals) => {
                const win = window.open(vals.pop_url, '_blank', `width=${vals.pop_w},height=${vals.pop_h}`);
                if (!win) throw new Error("Popup Blocked by Browser");
                return "Popup successfully opened";
            }
        },
        geolocation: {
            title: "Geolocation",
            fields: [
                { id: "geo_acc", label: "High Accuracy", type: "select", options: ["true", "false"], default: "true" }
            ],
            action: async (vals) => {
                return new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(
                        (p) => res(`Lat: ${p.coords.latitude}, Lon: ${p.coords.longitude}`),
                        (e) => rej(e),
                        { enableHighAccuracy: vals.geo_acc === "true" }
                    );
                });
            }
        },
        clipboard: {
            title: "Clipboard",
            fields: [
                { id: "clip_mode", label: "Mode", type: "select", options: ["Read", "Write"], default: "Read" },
                { id: "clip_text", label: "Text to Write", type: "text", default: "Hello World" }
            ],
            action: async (vals) => {
                if (vals.clip_mode === "Write") {
                    await navigator.clipboard.writeText(vals.clip_text);
                    return "Text written to clipboard";
                } else {
                    const txt = await navigator.clipboard.readText();
                    return `Read: ${txt || "[Empty]"}`;
                }
            }
        },
        camera: {
            title: "Camera",
            fields: [
                { id: "cam_res", label: "Resolution", type: "select", options: ["VGA", "HD", "FullHD"], default: "HD" }
            ],
            action: async (vals) => {
                const constraints = { VGA: {width: 640}, HD: {width: 1280}, FullHD: {width: 1920} };
                const stream = await navigator.mediaDevices.getUserMedia({ video: constraints[vals.cam_res] });
                stream.getTracks().forEach(t => t.stop());
                return `Camera Active: ${vals.cam_res}`;
            }
        },
        microphone: {
            title: "Microphone",
            fields: [
                { id: "mic_echo", label: "Echo Cancellation", type: "select", options: ["true", "false"], default: "true" }
            ],
            action: async (vals) => {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: vals.mic_echo === "true" } });
                stream.getTracks().forEach(t => t.stop());
                return "Microphone Accessed";
            }
        },
        mouselock: {
            title: "Mouse Lock",
            fields: [
                { id: "ml_msg", label: "Overlay Message", type: "text", default: "Pointer Locked!" }
            ],
            action: async (vals, btn) => {
                await btn.requestPointerLock();
                return vals.ml_msg;
            }
        },
        fileAccess: {
            title: "File System API",
            fields: [
                { id: "file_mode", label: "Mode", type: "select", options: ["Open", "Save"], default: "Open" }
            ],
            action: async (vals) => {
                if (vals.file_mode === "Open") {
                    const [handle] = await window.showOpenFilePicker();
                    return `Selected: ${handle.name}`;
                } else {
                    const handle = await window.showSaveFilePicker();
                    return `Saving to: ${handle.name}`;
                }
            }
        },
        desktopVideo: {
            title: "Screen Capture",
            fields: [
                { id: "dv_audio", label: "Include Audio", type: "select", options: ["true", "false"], default: "false" }
            ],
            action: async (vals) => {
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: true, 
                    audio: vals.dv_audio === "true" 
                });
                stream.getTracks().forEach(t => t.stop());
                return "Screen Share Ended";
            }
        },
        localFonts: {
            title: "Local Fonts",
            fields: [
                { id: "font_limit", label: "Max Display", type: "number", default: 5 }
            ],
            action: async (vals) => {
                if (!window.queryLocalFonts) throw new Error("Not supported in this browser");
                const fonts = await window.queryLocalFonts();
                return `Found ${fonts.length}. First ${vals.font_limit}: ` + 
                        fonts.slice(0, vals.font_limit).map(f => f.fullName).join(", ");
            }
        }
    };

    const container = document.getElementById('permission-container');
    const logEl = document.getElementById('master-log');

    function log(msg, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = `> [${new Date().toLocaleTimeString()}] ${msg}`;
        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
    }

    Object.keys(config).forEach(key => {
        const item = config[key];
        const card = document.createElement('div');
        card.className = 'perm-card';

        let fieldsHtml = '';
        item.fields.forEach(f => {
            fieldsHtml += `<div class="config-group">
                <label>${f.label}</label>
                ${f.type === 'select' ? 
                    `<select id="${f.id}">${f.options.map(o => `<option value="${o}">${o}</option>`).join('')}</select>` : 
                    `<input type="${f.type}" id="${f.id}" value="${f.default}">`
                }
            </div>`;
        });

        card.innerHTML = `
            <div class="perm-title">${item.title}</div>
            <div class="config-area">${fieldsHtml}</div>
            <button class="run-btn" id="btn-${key}">Execute Test</button>
            <div class="status-msg" id="status-${key}">Status: Ready</div>
        `;

        container.appendChild(card);

        card.querySelector(`#btn-${key}`).addEventListener('click', async function() {
            const status = card.querySelector(`#status-${key}`);
            status.textContent = "Status: Processing...";
            status.className = "status-msg";

            try {

                const vals = {};
                item.fields.forEach(f => {
                    vals[f.id] = document.getElementById(f.id).value;
                });

                const result = await item.action(vals, this);
                status.textContent = `Status: Success`;
                status.classList.add('success');
                log(`${item.title}: ${result}`, 'success');
            } catch (err) {
                status.textContent = `Status: Error`;
                status.classList.add('error');
                log(`${item.title}: ${err.message || err}`, 'error');
            }
        });
    });
</script>

</body>
</html>
